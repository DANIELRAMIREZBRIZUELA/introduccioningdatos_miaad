version: 2

models:
  - name: stg_openweather__weather
    description: Datos diarios de OpenWeather limpiados desde la fuente raw.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1
            max_value: 10000000
    columns:
      - name: city_name
        description: Nombre de ciudad derivado de timezone.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Za-z\\-\\s]+$"
      - name: country_code
        description: Código de país (placeholder actual N/A).
        tests:
          - not_null
      - name: observation_ts
        description: Timestamp de observación del clima.
        tests:
          - not_null
      - name: observation_date
        description: Fecha de observación del clima.
        tests:
          - not_null
      - name: temperature_c
        description: Temperatura en grados Celsius.
        tests:
          - not_null
      - name: humidity_pct
        description: Humedad relativa en porcentaje.
        tests:
          - not_null

  - name: stg_openweather__current
    description: Datos actuales de OpenWeather parseados del JSON current.
    columns:
      - name: _airbyte_raw_id
        description: Identificador técnico del registro crudo en Airbyte.
        tests:
          - not_null
          - unique
      - name: city_name
        description: Nombre de ciudad derivado de timezone.
        tests:
          - not_null
      - name: country_code
        description: Código de país (placeholder actual N/A).
        tests:
          - not_null
      - name: observation_ts
        description: Timestamp de observación actual.
        tests:
          - not_null
      - name: observation_date
        description: Fecha de observación actual.
        tests:
          - not_null
      - name: temperature_c
        description: Temperatura actual en grados Celsius.
        tests:
          - not_null
      - name: humidity_pct
        description: Humedad actual en porcentaje.
        tests:
          - not_null
